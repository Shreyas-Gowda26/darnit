# Pre-commit hooks for local development
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Ruff - Fast Python linter and formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      # Linter - catches unused imports, variables, common bugs
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      # Formatter - consistent code style
      - id: ruff-format

  # Basic file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]  # Allow custom tags in GitHub Actions
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key

  # Check for common security issues
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.2
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]
        exclude: ^tests/

  # Local hooks for project-specific validation
  - repo: local
    hooks:
      # Validate spec-implementation synchronization
      - id: sync-validation
        name: Validate spec-implementation sync
        entry: uv run python scripts/validate_sync.py --changed-files
        language: system
        files: ^(packages/darnit/|openspec/specs/framework-design/)
        pass_filenames: false
        stages: [pre-commit]

# CI configuration
ci:
  autofix_commit_msg: "style: auto-fix linting issues [pre-commit.ci]"
  autoupdate_commit_msg: "chore: update pre-commit hooks [pre-commit.ci]"
